# coturn for quran-agent — TURN relay for BOTH transports (pion + LiveKit).
# Auth is the "TURN REST API" ephemeral-credential scheme: web-service mints
# username "<expiry>:<id>" + HMAC-SHA1 credential from the shared secret
# (services/web/internal/turncred); coturn validates with the same secret.
# The secret itself is passed on the command line via compose:
#   --static-auth-secret=$TURN_SECRET
# Prod additionally passes --external-ip=<VM public IP>.

listening-port=3478
# TLS TURN (5349) is enabled in prod by passing cert/key flags in compose;
# plain 3478 UDP/TCP is enough for the local demo.

# Bounded relay range: enough for dozens of concurrent calls, small enough to
# firewall precisely and to suit a small (2 GB) VM.
min-port=49160
max-port=49960

use-auth-secret
realm=quran

fingerprint
no-cli
no-software-attribute
# Log allocations/permissions (invaluable when debugging relay pairing).
# In-container coturn logs to syslog unless told otherwise — force stdout.
verbose
log-file=stdout
simple-log

# Never relay to loopback/private targets other than our own media ports.
no-multicast-peers
