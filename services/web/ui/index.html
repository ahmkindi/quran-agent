<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#10141d" />
  <title>Al-Kindi · رفيق القرآن</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="chooser">
    <div class="basmala" lang="ar" dir="rtl" aria-label="Bismillah">﷽</div>
    <h1 class="title">Al-Kindi</h1>
    <p class="title-ar" lang="ar" dir="rtl">رفيق القرآن الصوتي</p>
    <p class="sub">One agent, two transports — compare the audio path.</p>
    <div class="cards">
      <a class="choice" href="/pion">
        <svg class="star star-sm" viewBox="0 0 160 160" aria-hidden="true">
          <g class="star-frame">
            <polygon points="80,16 144,80 80,144 16,80" />
            <polygon points="34.7,34.7 125.3,34.7 125.3,125.3 34.7,125.3" />
          </g>
          <g class="star-rose">
            <polygon points="80,46 114,80 80,114 46,80" />
            <polygon points="56,56 104,56 104,104 56,104" />
          </g>
          <circle class="star-core" cx="80" cy="80" r="6.5" />
        </svg>
        <h2>Raw pion</h2>
        <p>Hand-rolled WebRTC + our 20 ms pacer.</p>
      </a>
      <a class="choice" href="/livekit">
        <svg class="star star-sm" viewBox="0 0 160 160" aria-hidden="true">
          <g class="star-frame">
            <polygon points="80,16 144,80 80,144 16,80" />
            <polygon points="34.7,34.7 125.3,34.7 125.3,125.3 34.7,125.3" />
          </g>
          <g class="star-lace">
            <circle cx="80" cy="80" r="52.5" />
          </g>
          <circle class="star-core" cx="80" cy="80" r="6.5" />
        </svg>
        <h2>LiveKit</h2>
        <p>Self-hosted SFU + LiveKit’s media stack.</p>
      </a>
    </div>
  </main>
</body>
</html>
