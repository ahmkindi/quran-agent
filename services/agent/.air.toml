root = "."
tmp_dir = "tmp/agent"

[build]
  # agent-service is pure Go -> CGO off keeps it lean.
  cmd = "CGO_ENABLED=0 go build -buildvcs=false -o ./tmp/agent/main ./services/agent/cmd/server"
  bin = "./tmp/agent/main"
  include_ext = ["go"]
  exclude_dir = ["tmp", "gen", "services/web", "deploy", "build"]
  delay = 200
  stop_on_error = true

[misc]
  clean_on_exit = true
